databases:
  - name: smartdesk-db
    databaseName: smartdesk
    user: smartdesk
    plan: free

services:
  - type: web
    name: smartdesk-api
    env: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/v3/api-docs
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: smartdesk-db
          property: connectionString
      - key: REDIS_URL
        sync: false        # paste your Upstash Redis URL here (rediss://default:pass@host:port)
      - key: JWT_SECRET
        generateValue: true
      - key: ANTHROPIC_API_KEY
        sync: false        # leave blank to disable AI features
      - key: CORS_ALLOWED_ORIGINS
        value: https://cheikhaoui.github.io
