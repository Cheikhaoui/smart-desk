spring:
  application:
    name: smartdesk-backend

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/smartdesk}
    username: ${SPRING_DATASOURCE_USERNAME:smartdesk}
    password: ${SPRING_DATASOURCE_PASSWORD:smartdesk_secret}
    hikari:
      maximum-pool-size: 10

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: ${SPRING_REDIS_HOST:localhost}
      port: ${SPRING_REDIS_PORT:6379}
      password: ${SPRING_REDIS_PASSWORD:redis_secret}

  jackson:
    default-property-inclusion: non_null

server:
  port: 8080
  servlet:
    context-path: /api

app:
  jwt:
    secret: ${JWT_SECRET:dev_secret_change_in_production_must_be_256_bits_long_minimum_32_chars}
    expiration-ms: 86400000        # 24 hours
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200}
  ai:
    confidence-threshold: 0.6
    claude:
      api-key: ${ANTHROPIC_API_KEY:XXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX}
      model: claude-haiku-4-5-20251001

logging:
  level:
    dev.smartdesk: DEBUG
    org.springframework.security: INFO

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    display-request-duration: true